<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Math Sprint</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --text-color: #ffffff;
            --primary: #ff4757;
            --secondary: #ff6b81;
            --panel-bg: #1e1e24;
            --correct: #2ed573;
            --wrong: #ff4757;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            transition: background-color 0.15s ease;
        }

        /* Flash Effects */
        body.flash-correct { background-color: rgba(46, 213, 115, 0.2); }
        body.flash-wrong { background-color: rgba(255, 71, 87, 0.2); }

        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 600px; }
        h1 { margin: 0 0 10px 0; color: var(--primary); font-size: 2.5rem; text-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .score-text { color: #f1c40f; }
        .high-score-text { color: #7bed9f; font-size: 1rem; align-self: center;}

        /* Progress Timer Bar */
        .timer-container { width: 100%; max-width: 600px; height: 15px; background: #2d2d3a; border-radius: 10px; overflow: hidden; margin-bottom: 30px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        #timerBar { height: 100%; width: 100%; background: linear-gradient(90deg, #2ed573, #f1c40f, #ff4757); transition: width 0.1s linear; transform-origin: left; }

        /* Setup Panel */
        #setupPanel {
            background: var(--panel-bg); padding: 30px; border-radius: 15px; text-align: center;
            width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        select { padding: 10px; width: 100%; background: #2d2d3a; color: white; border: 1px solid #444; border-radius: 8px; font-size: 1.1rem; margin: 15px 0; outline: none; cursor: pointer; }
        
        button.start-btn {
            width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        button.start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4); }

        /* Game Area */
        #gameArea { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
        
        .equation-box {
            font-size: 4.5rem; font-weight: bold; margin-bottom: 40px; text-align: center;
            letter-spacing: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        
        .option-btn {
            background: var(--panel-bg); color: white; border: 2px solid #333;
            font-size: 2rem; font-weight: bold; padding: 25px 10px; border-radius: 15px;
            cursor: pointer; transition: 0.1s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .option-btn:hover { background: #2d2d3a; border-color: var(--primary); transform: scale(1.02); }
        .option-btn:active { transform: scale(0.95); }

        /* Overlays */
        #gameOverOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 19, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .go-title { font-size: 3.5rem; color: var(--primary); margin-bottom: 10px; }
        .go-score { font-size: 2.5rem; color: #f1c40f; margin-bottom: 30px; }
        
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 101; }
        .confetti { position: absolute; width: 10px; height: 20px; top: -20px; opacity: 0.8; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <div class="header">
        <h1>Math Sprint</h1>
        <div class="stats-bar">
            <div>Time: <span id="timeText">60</span>s</div>
            <div class="high-score-text">Best: <span id="highScoreText">0</span></div>
            <div>Score: <span id="scoreText" class="score-text">0</span></div>
        </div>
        <div class="timer-container"><div id="timerBar"></div></div>
    </div>

    <div id="setupPanel">
        <h2>Select Difficulty</h2>
        <select id="diffSel">
            <option value="easy">Easy (+, -)</option>
            <option value="medium" selected>Medium (+, -, ×)</option>
            <option value="hard">Hard (+, -, ×, ÷)</option>
            <option value="pro">Pro (Bigger Numbers)</option>
            <option value="master">Master (Mixed Operations)</option>
        </select>
        <button class="start-btn" id="startBtn">Start 60s Sprint</button>
    </div>

    <div id="gameArea">
        <div class="equation-box" id="equationDisplay">3 + 5 = ?</div>
        <div class="options-grid" id="optionsGrid">
            <button class="option-btn">0</button>
            <button class="option-btn">0</button>
            <button class="option-btn">0</button>
            <button class="option-btn">0</button>
        </div>
    </div>

    <div id="gameOverOverlay">
        <div class="go-title">Time's Up!</div>
        <div class="go-score">Final Score: <span id="finalScore">0</span></div>
        <button class="start-btn" style="max-width: 300px;" id="restartBtn">Play Again</button>
    </div>

    <script>
        const setupPanel = document.getElementById('setupPanel');
        const gameArea = document.getElementById('gameArea');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const equationDisplay = document.getElementById('equationDisplay');
        const optionsGrid = document.getElementById('optionsGrid');
        const scoreText = document.getElementById('scoreText');
        const timeText = document.getElementById('timeText');
        const timerBar = document.getElementById('timerBar');
        const highScoreText = document.getElementById('highScoreText');
        const confettiContainer = document.getElementById('confetti-container');

        let score = 0;
        let timeRemaining = 60;
        let maxTime = 60;
        let gameInterval;
        let currentAnswer = 0;
        let currentDifficulty = 'medium';
        let sessionHighScore = 0;

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', () => {
            gameOverOverlay.style.display = 'none';
            setupPanel.style.display = 'block';
            confettiContainer.innerHTML = '';
        });

        function startGame() {
            currentDifficulty = document.getElementById('diffSel').value;
            score = 0;
            timeRemaining = maxTime;
            scoreText.innerText = score;
            
            setupPanel.style.display = 'none';
            gameArea.style.display = 'flex';
            
            generateQuestion();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(updateTimer, 100); // Update every 100ms for smooth bar
        }

        function updateTimer() {
            timeRemaining -= 0.1;
            timeText.innerText = Math.ceil(timeRemaining);
            
            // Calculate width percentage
            let widthPct = (timeRemaining / maxTime) * 100;
            timerBar.style.width = `${widthPct}%`;

            // Color coding based on time
            if (widthPct > 50) timerBar.style.background = '#2ed573';
            else if (widthPct > 20) timerBar.style.background = '#f1c40f';
            else timerBar.style.background = '#ff4757';

            if (timeRemaining <= 0) endGame();
        }

        // --- MATH GENERATION ENGINE ---
        function generateQuestion() {
            let num1, num2, num3, op, op2, equation;

            switch(currentDifficulty) {
                case 'easy': // + and - (1 to 20), no negatives
                    op = ['+', '-'][Math.floor(Math.random() * 2)];
                    num1 = rand(1, 20); num2 = rand(1, 20);
                    if(op === '-' && num1 < num2) [num1, num2] = [num2, num1];
                    currentAnswer = op === '+' ? num1 + num2 : num1 - num2;
                    equation = `${num1} ${op} ${num2}`;
                    break;
                
                case 'medium': // +, -, * (up to 12)
                    op = ['+', '-', '*'][Math.floor(Math.random() * 3)];
                    if (op === '*') { num1 = rand(2, 12); num2 = rand(2, 12); } 
                    else { num1 = rand(10, 50); num2 = rand(10, 50); }
                    if(op === '-' && num1 < num2) [num1, num2] = [num2, num1];
                    currentAnswer = op === '+' ? num1 + num2 : (op === '-' ? num1 - num2 : num1 * num2);
                    equation = `${num1} ${op === '*' ? '×' : op} ${num2}`;
                    break;

                case 'hard': // +, -, *, / (clean division)
                    op = ['+', '-', '*', '/'][Math.floor(Math.random() * 4)];
                    if (op === '/') {
                        num2 = rand(2, 15);
                        currentAnswer = rand(2, 15);
                        num1 = num2 * currentAnswer; // Ensures clean division
                    } else if (op === '*') { num1 = rand(5, 15); num2 = rand(5, 15); currentAnswer = num1 * num2; } 
                    else { num1 = rand(20, 100); num2 = rand(20, 100); currentAnswer = op === '+' ? num1 + num2 : num1 - num2; }
                    equation = `${num1} ${op === '*' ? '×' : (op === '/' ? '÷' : op)} ${num2}`;
                    break;

                case 'pro': // Bigger numbers, includes negatives in subtraction
                    op = ['+', '-', '*', '/'][Math.floor(Math.random() * 4)];
                    if (op === '/') {
                        num2 = rand(10, 30); currentAnswer = rand(5, 30); num1 = num2 * currentAnswer;
                    } else if (op === '*') { num1 = rand(10, 25); num2 = rand(10, 25); currentAnswer = num1 * num2; } 
                    else { num1 = rand(100, 500); num2 = rand(100, 500); currentAnswer = op === '+' ? num1 + num2 : num1 - num2; }
                    equation = `${num1} ${op === '*' ? '×' : (op === '/' ? '÷' : op)} ${num2}`;
                    break;

                case 'master': // 3 terms: a + b * c
                    op = ['+', '-'][Math.floor(Math.random() * 2)];
                    op2 = '*';
                    num1 = rand(10, 50); num2 = rand(2, 12); num3 = rand(2, 12);
                    let multPart = num2 * num3;
                    currentAnswer = op === '+' ? num1 + multPart : num1 - multPart;
                    equation = `${num1} ${op} ${num2} × ${num3}`;
                    break;
            }

            equationDisplay.innerText = equation;
            generateOptions(currentAnswer);
        }

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generateOptions(correct) {
            let options = [correct];
            // Generate 3 unique wrong answers that are close to the correct one
            while(options.length < 4) {
                // Fluctuate by -10 to +10, or small percentage
                let offset = rand(-15, 15);
                if (offset === 0) offset = 5;
                let wrongObj = correct + offset;
                
                // For multiplication/division, sometimes off by 10 or 1 is a common mistake
                if (Math.random() > 0.5 && correct > 20) wrongObj = correct + (rand(1, 2) * 10); 

                if (!options.includes(wrongObj)) options.push(wrongObj);
            }

            // Shuffle options
            options.sort(() => Math.random() - 0.5);

            optionsGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (selected === currentAnswer) {
                // Correct
                score += 10;
                flashScreen('correct');
                generateQuestion(); // Instantly load next
            } else {
                // Wrong - Penalty
                timeRemaining -= 2; // Lose 2 seconds!
                flashScreen('wrong');
            }
            scoreText.innerText = score;
        }

        function flashScreen(type) {
            document.body.classList.add(`flash-${type}`);
            setTimeout(() => {
                document.body.classList.remove(`flash-${type}`);
            }, 150);
        }

        function endGame() {
            clearInterval(gameInterval);
            timerBar.style.width = '0%';
            timeText.innerText = "0";
            
            gameArea.style.display = 'none';
            gameOverOverlay.style.display = 'flex';
            document.getElementById('finalScore').innerText = score;

            if (score > sessionHighScore) {
                sessionHighScore = score;
                highScoreText.innerText = sessionHighScore;
                triggerCelebration(); // Confetti only on high score!
            }
        }

        function triggerCelebration() {
            const colors = ['#ff4757', '#2ed573', '#f1c40f', '#1e90ff']; 
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 1 + 's';
                confettiContainer.appendChild(confetti);
            }
        }
    </script>
</body>
</html>

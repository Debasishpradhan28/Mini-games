<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Memory Challenge</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --text-color: #ffffff;
            --tile-idle: linear-gradient(145deg, #2d3436, #1e272e);
            --tile-highlight: linear-gradient(145deg, #00cec9, #0984e3);
            --tile-correct: linear-gradient(145deg, #00b894, #26de81);
            --tile-wrong: linear-gradient(145deg, #d63031, #ff7675);
            --tile-missed: linear-gradient(145deg, #fdcb6e, #e17055);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh; /* Full viewport height */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* Hide scrollbars during confetti */
        }

        /* --- Header & Settings Bar --- */
        .top-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0; /* Prevents header from shrinking */
        }

        h1 { margin: 0 0 5px 0; color: #a29bfe; font-size: 2rem; text-shadow: 0 2px 10px rgba(162, 155, 254, 0.3); }
        
        #statusText {
            font-size: 1.3rem;
            color: #aaaaaa;
            height: 30px;
            margin-bottom: 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        .controls-container {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #1e1e1e;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .setting-group { display: flex; align-items: center; gap: 10px; }
        .setting-group label { font-size: 0.9rem; color: #aaa; }
        .info-text { font-size: 0.9rem; color: #888; margin-left: 10px; border-left: 1px solid #444; padding-left: 15px;}

        select {
            padding: 8px 12px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 20px;
            cursor: pointer;
            outline: none;
        }

        button {
            padding: 10px 24px;
            font-size: 1rem;
            background: linear-gradient(to right, #a29bfe, #6c5ce7);
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; cursor: not-allowed; color: #888; box-shadow: none; transform: none;}

        /* --- Main Grid Area --- */
        .board-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .grid {
            display: grid;
            gap: 12px; /* Slightly tighter gap so it scales well */
            
            /* THE FIX: This forces the grid to never grow taller than your screen */
            width: min(100%, calc(100vh - 220px));
            max-width: 650px; 
            aspect-ratio: 1 / 1; 
        }

        .tile {
            background: var(--tile-idle);
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            height: 100%; /* Ensures tiles stretch to fill their grid cell */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Tile Interactive States */
        .tile:hover { transform: scale(1.05); box-shadow: 0 8px 16px rgba(0,0,0,0.4); z-index: 2; }
        
        .tile.highlight { background: var(--tile-highlight); transform: scale(1.03); box-shadow: 0 0 20px rgba(0, 206, 201, 0.6); }
        .tile.correct { background: var(--tile-correct); pointer-events: none; transform: scale(1.02); box-shadow: 0 0 15px rgba(0, 184, 148, 0.5); }
        .tile.wrong { background: var(--tile-wrong); animation: shake 0.5s; }
        .tile.missed { background: var(--tile-missed); opacity: 0.6; pointer-events: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* --- Celebration Confetti --- */
        #confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
        }
        .confetti { position: absolute; width: 10px; height: 20px; top: -20px; opacity: 0.8; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>
    <div id="confetti-container"></div>

    <div class="top-bar">
        <h1>Pattern Memory</h1>
        <div id="statusText">Press Start to begin</div>
        
        <div class="controls-container">
            <div class="setting-group">
                <select id="levelSel">
                    <option value="easy">Easy (3x3)</option>
                    <option value="medium" selected>Medium (4x4)</option>
                    <option value="hard">Hard (5x5)</option>
                    <option value="master">Master (6x6)</option>
                </select>
            </div>
            <div class="info-text">
                Targets: <strong id="targetCountText">6</strong> | Time: <strong id="timeText">1.5s</strong>
            </div>
            <button id="startBtn">Start Game</button>
        </div>
    </div>

    <div class="board-container">
        <div id="grid" class="grid"></div>
    </div>

    <script>
        const config = {
            easy:   { size: 3, targets: 4, time: 2000 },
            medium: { size: 4, targets: 6, time: 1500 },
            hard:   { size: 5, targets: 9, time: 1200 },
            master: { size: 6, targets: 15, time: 3000 }
        };

        const gridElement = document.getElementById('grid');
        const startBtn = document.getElementById('startBtn');
        const levelSel = document.getElementById('levelSel');
        const statusText = document.getElementById('statusText');
        const confettiContainer = document.getElementById('confetti-container');

        let activeTiles = [];
        let clickedTiles = [];
        let gameState = 'waiting';
        let currentLevel = config.medium;

        levelSel.addEventListener('change', (e) => {
            currentLevel = config[e.target.value];
            document.getElementById('targetCountText').textContent = currentLevel.targets;
            document.getElementById('timeText').textContent = currentLevel.time / 1000 + 's';
            if(gameState === 'waiting' || gameState === 'gameover') buildGrid();
        });

        startBtn.addEventListener('click', startGame);

        function buildGrid() {
            gridElement.innerHTML = ''; 
            gridElement.style.gridTemplateColumns = `repeat(${currentLevel.size}, 1fr)`;
            gridElement.style.gridTemplateRows = `repeat(${currentLevel.size}, 1fr)`;

            const totalTiles = currentLevel.size * currentLevel.size;
            for (let i = 0; i < totalTiles; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.addEventListener('click', () => handleTileClick(i, tile));
                gridElement.appendChild(tile);
            }
        }

        function startGame() {
            gameState = 'memorizing';
            activeTiles = [];
            clickedTiles = [];
            startBtn.disabled = true;
            levelSel.disabled = true;
            statusText.style.color = "#a29bfe";
            statusText.textContent = "Memorize the pattern!";
            confettiContainer.innerHTML = ''; // Clear previous celebration

            buildGrid();

            const totalTiles = currentLevel.size * currentLevel.size;
            const tiles = gridElement.children;

            while (activeTiles.length < currentLevel.targets) {
                const randomIdx = Math.floor(Math.random() * totalTiles);
                if (!activeTiles.includes(randomIdx)) {
                    activeTiles.push(randomIdx);
                    tiles[randomIdx].classList.add('highlight');
                }
            }

            setTimeout(() => {
                Array.from(tiles).forEach(tile => tile.classList.remove('highlight'));
                gameState = 'playing';
                statusText.color = "#ffffff";
                statusText.textContent = `Find the ${currentLevel.targets} tiles!`;
            }, currentLevel.time);
        }

        function handleTileClick(index, tileElement) {
            if (gameState !== 'playing') return; 
            if (clickedTiles.includes(index)) return; 

            clickedTiles.push(index);

            if (activeTiles.includes(index)) {
                tileElement.classList.add('correct');
                const correctClicks = clickedTiles.filter(i => activeTiles.includes(i));
                if (correctClicks.length === activeTiles.length) {
                    endGame(true);
                }
            } else {
                tileElement.classList.add('wrong');
                endGame(false);
            }
        }

        function endGame(win) {
            gameState = 'gameover';
            startBtn.disabled = false;
            levelSel.disabled = false;
            startBtn.textContent = "Play Again";
            const tiles = gridElement.children;

            if (win) {
                statusText.textContent = "Awesome! Pattern matched!";
                statusText.style.color = "#26de81";
                triggerCelebration();
            } else {
                statusText.textContent = "Oops! Wrong tile.";
                statusText.style.color = "#ff7675";
                activeTiles.forEach(idx => {
                    if (!clickedTiles.includes(idx)) tiles[idx].classList.add('missed');
                });
            }
        }

        function triggerCelebration() {
            const colors = ['#a29bfe', '#00cec9', '#00b894', '#fdcb6e']; 
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confettiContainer.appendChild(confetti);
            }
        }

        buildGrid();
    </script>
</body>
</html>
